<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>GitHub Stable Voice Studio</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.app {
  width: 800px;
  background: #111827;
  padding: 22px;
  border-radius: 16px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.6);
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 10px;
  padding: 10px;
  border: none;
  font-size: 14px;
}

select, input, button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.play { background: #22c55e; color: white; }
.stop { background: #ef4444; color: white; }
.download { background: #3b82f6; color: white; }

small {
  opacity: 0.7;
  display: block;
  margin-top: 6px;
}

.row {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="app">

<h2>🌐 GitHub Stable Voice Studio</h2>

<textarea id="text">Salut! Acesta este voice studio stabil pentru GitHub Pages.</textarea>

<div class="row">
<label>Voce</label>
<select id="voices"></select>
</div>

<div class="row">
<label>Pitch (0.5 - 2)</label>
<input type="range" id="pitch" min="0.5" max="2" step="0.01" value="1">
</div>

<div class="row">
<label>Viteză</label>
<input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
</div>

<div class="row">
<label>Volum</label>
<input type="range" id="volume" min="0" max="1" step="0.1" value="1">
</div>

<button class="play" onclick="speak()">▶ Speak</button>
<button class="stop" onclick="stop()">⏹ Stop</button>

<button class="download" onclick="startRecording()">🎙 Start Recording</button>
<button class="stop" onclick="stopRecording()">⏹ Stop Recording</button>

<audio id="audio" controls style="width:100%; margin-top:10px;"></audio>

<small>✔ GitHub Pages safe • Web Speech API • Web Audio recording</small>

</div>

<script>

let voices = [];
let mediaRecorder;
let recordedChunks = [];
let audioStream;

function loadVoices() {
  voices = speechSynthesis.getVoices();
  const select = document.getElementById("voices");

  select.innerHTML = "";

  voices.forEach((v, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = v.name + " (" + v.lang + ")";
    select.appendChild(opt);
  });
}

speechSynthesis.onvoiceschanged = loadVoices;

function speak() {

  const text = document.getElementById("text").value;
  const voiceIndex = document.getElementById("voices").value;

  speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);

  utterance.voice = voices[voiceIndex];
  utterance.pitch = parseFloat(document.getElementById("pitch").value);
  utterance.rate = parseFloat(document.getElementById("rate").value);
  utterance.volume = parseFloat(document.getElementById("volume").value);

  speechSynthesis.speak(utterance);
}

function stop() {
  speechSynthesis.cancel();
}

/* ---------------- RECORDING ---------------- */

async function startRecording() {

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioStream = stream;

  mediaRecorder = new MediaRecorder(stream);
  recordedChunks = [];

  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };

  mediaRecorder.start();

  alert("Recording started 🎙");
}

function stopRecording() {

  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
  }

  mediaRecorder.onstop = () => {

    const blob = new Blob(recordedChunks, { type: "audio/webm" });
    const url = URL.createObjectURL(blob);

    const audio = document.getElementById("audio");
    audio.src = url;

    const a = document.createElement("a");
    a.href = url;
    a.download = "recording.webm";
    a.click();
  };

  if (audioStream) {
    audioStream.getTracks().forEach(t => t.stop());
  }
}

</script>

</body>
</html>
