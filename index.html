<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>GitHub Stable Voice Studio</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.app {
  width: 800px;
  background: #111827;
  padding: 22px;
  border-radius: 16px;
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 10px;
  padding: 10px;
}

select, input, button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.play { background: #22c55e; color: white; }
.stop { background: #ef4444; color: white; }
.download { background: #3b82f6; color: white; }
</style>
</head>

<body>

<div class="app">

<h2>🌐 Voice Studio Stable</h2>

<textarea id="text">Test voce cu diacritice: Împădurirea și biodiversitatea sunt importante.</textarea>

<select id="voices"></select>

<label>Pitch</label>
<input type="range" id="pitch" min="0.5" max="2" step="0.01" value="1">

<label>Viteză</label>
<input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">

<label>Volum</label>
<input type="range" id="volume" min="0" max="1" step="0.1" value="1">

<button class="play" onclick="speak()">▶ Speak</button>
<button class="stop" onclick="stop()">⏹ Stop</button>

<button id="stealthBtn" class="download" onclick="toggleStealth()">
🕵️ Ascunde vocea
</button>

</div>

<script>

let voices = [];
let stealthMode = false;

function loadVoices() {
  voices = speechSynthesis.getVoices();
  const select = document.getElementById("voices");

  select.innerHTML = "";

  voices.forEach((v, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = v.name + " (" + v.lang + ")";
    select.appendChild(opt);
  });
}

speechSynthesis.onvoiceschanged = loadVoices;

function speak() {

  const text = document.getElementById("text").value;
  const voiceIndex = document.getElementById("voices").value;

  speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);

  utterance.voice = voices[voiceIndex];

  // NORMAL vs STEALTH
  if (stealthMode) {
    utterance.pitch = 0.65;   // mai grav
    utterance.rate = 0.95;    // ușor mai lent
    utterance.volume = 0.9;
  } else {
    utterance.pitch = parseFloat(document.getElementById("pitch").value);
    utterance.rate = parseFloat(document.getElementById("rate").value);
    utterance.volume = parseFloat(document.getElementById("volume").value);
  }

  speechSynthesis.speak(utterance);
}

function stop() {
  speechSynthesis.cancel();
}

function toggleStealth() {

  stealthMode = !stealthMode;

  const btn = document.getElementById("stealthBtn");

  if (stealthMode) {
    btn.innerText = "🟢 Voce ascunsă ACTIVĂ";
    btn.style.background = "#ef4444";
  } else {
    btn.innerText = "🕵️ Ascunde vocea";
    btn.style.background = "#3b82f6";
  }
}

</script>

</body>
</html>
